name: Home Cook CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: home-cook-pages
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run static analysis
        run: flutter analyze

      - name: Run unit and widget tests
        run: flutter test

      - name: Add Linux desktop target for integration tests
        run: flutter create --platforms=linux .

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev xvfb

      - name: Run integration tests
        run: xvfb-run -a flutter test integration_test -d linux

      - name: Build Flutter Web
        run: flutter build web --release --base-href /thefoodapp/

      - name: Zip web build
        run: zip -r the-home-cook-web-build.zip build/web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-home-cook-web-build
          path: the-home-cook-web-build.zip
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web for GitHub Pages
        run: flutter build web --release --base-href /thefoodapp/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
